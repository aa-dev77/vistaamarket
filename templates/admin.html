<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vista Market - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --vista:#00A86B; --vista-l:#D1FAE5; --vista-d:#007A4D; --w:#fff; --gray:#F3F4F6; --dark:#1F2937; --red:#EF4444; --green:#10B981; --orange:#F59E0B; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--gray); min-height:100vh; }
        
        .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .login-box { background:var(--w); padding:30px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.1); width:100%; max-width:380px; text-align:center; }
        .login-box .icon { font-size:40px; color:var(--vista); margin-bottom:12px; }
        .login-box h1 { font-size:22px; margin-bottom:4px; }
        .login-box p { color:#6B7280; margin-bottom:20px; font-size:14px; }
        .login-box input { width:100%; padding:12px; border:2px solid #E5E7EB; border-radius:10px; font-size:15px; margin-bottom:12px; outline:none; }
        .login-box input:focus { border-color:var(--vista); }
        .login-box button { width:100%; padding:14px; background:var(--vista); color:var(--w); border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; }
        .login-box a { display:block; margin-top:12px; color:#6B7280; text-decoration:none; font-size:14px; }
        
        .dash { display:none; }
        .topbar { background:var(--dark); color:var(--w); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
        .topbar h3 { font-size:15px; }
        .menu-btn { background:none; border:none; color:var(--w); font-size:22px; cursor:pointer; display:none; }
        .btn-logout { padding:7px 12px; background:rgba(239,68,68,.2); color:var(--red); border:none; border-radius:8px; cursor:pointer; font-size:12px; }
        
        .main-layout { display:flex; min-height:calc(100vh - 52px); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); z-index:99; }
        
        .sidebar { width:250px; background:var(--w); border-right:1px solid #E5E7EB; padding:12px; position:sticky; top:52px; height:calc(100vh - 52px); overflow-y:auto; }
        .sidebar button { display:flex; align-items:center; gap:8px; width:100%; padding:11px 12px; border:none; background:none; border-radius:10px; cursor:pointer; font-size:13px; font-weight:500; color:#374151; margin-bottom:3px; text-align:left; }
        .sidebar button:hover { background:var(--gray); }
        .sidebar button.active { background:var(--vista); color:var(--w); }
        
        .content { flex:1; padding:16px; overflow-y:auto; }
        
        .card { background:var(--w); border-radius:12px; padding:16px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
        .card h3 { margin-bottom:12px; font-size:15px; font-weight:600; }
        
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:16px; }
        .stat { background:var(--w); padding:16px; border-radius:12px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.05); }
        .stat .num { font-size:26px; font-weight:700; color:var(--vista); }
        .stat .label { font-size:11px; color:#6B7280; margin-top:4px; }
        
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; min-width:700px; }
        th,td { padding:10px 12px; text-align:left; border-bottom:1px solid #E5E7EB; font-size:13px; }
        th { background:#F9FAFB; font-weight:600; color:#6B7280; font-size:11px; text-transform:uppercase; }
        td img { width:45px; height:45px; border-radius:8px; object-fit:cover; }
        
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .form-group label { display:block; font-size:12px; font-weight:500; color:#374151; margin-bottom:4px; }
        .form-group input,.form-group select,.form-group textarea { width:100%; padding:10px; border:2px solid #E5E7EB; border-radius:8px; font-size:13px; font-family:inherit; outline:none; }
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--vista); }
        .full { grid-column:1/-1; }
        
        .file-box { border:2px dashed #E5E7EB; border-radius:12px; padding:20px; text-align:center; cursor:pointer; }
        .file-box:hover { border-color:var(--vista); background:#F0F5FF; }
        .file-box i { font-size:32px; color:var(--vista); }
        .file-box p { color:#6B7280; font-size:12px; margin-top:4px; }
        .file-box img { max-width:150px; max-height:150px; margin-top:8px; border-radius:8px; }
        .file-box input { display:none; }
        
        .btn { padding:7px 14px; border:none; border-radius:8px; cursor:pointer; font-weight:500; font-size:12px; display:inline-flex; align-items:center; gap:5px; }
        .btn-green { background:var(--vista); color:var(--w); }
        .btn-red { background:var(--red); color:var(--w); }
        .btn-blue { background:var(--vista); color:var(--w); }
        .btn-sm { padding:5px 10px; font-size:11px; }
        .btn-outline { background:transparent; border:1px solid var(--vista); color:var(--vista); }
        
        .badge { padding:3px 8px; border-radius:50px; font-size:11px; font-weight:600; }
        .badge-green { background:#D1FAE5; color:var(--vista); }
        .badge-yellow { background:#FEF3C7; color:var(--orange); }
        .badge-red { background:#FEE2E2; color:var(--red); }
        
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); z-index:999; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal { background:var(--w); padding:24px; border-radius:16px; width:90%; max-width:500px; max-height:90vh; overflow-y:auto; position:relative; }
        .modal .close { position:absolute; top:12px; right:16px; font-size:22px; cursor:pointer; background:none; border:none; color:#6B7280; }
        
        .banner-item { background:var(--gray); border-radius:10px; padding:12px; margin-bottom:10px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .banner-item img { width:80px; height:60px; object-fit:cover; border-radius:8px; }
        .banner-item .info { flex:1; }
        .banner-item .info h4 { font-size:14px; margin-bottom:4px; }
        .banner-item .info p { font-size:12px; color:#6B7280; }
        .banner-item .actions { display:flex; gap:6px; }
        
        @media(max-width:768px) {
            .menu-btn { display:block; }
            .sidebar { position:fixed; left:-260px; top:0; height:100vh; z-index:200; transition:left .3s; width:260px; padding-top:60px; }
            .sidebar.open { left:0; }
            .overlay.show { display:block; }
            .content { width:100%; }
            .form-grid { grid-template-columns:1fr; }
            .banner-item { flex-direction:column; text-align:center; }
        }
    </style>
</head>
<body>

<div id="loginPage" class="login-wrap">
    <div class="login-box">
        <div class="icon"><i class="fa-solid fa-store"></i></div>
        <h1>Vista Market Admin</h1>
        <p>Boshqaruv paneli</p>
        <input type="password" id="passInput" placeholder="Parol" onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> Kirish</button>
        <a href="/">← Do'konga qaytish</a>
    </div>
</div>

<div id="dashPage" class="dash">
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    
    <div class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h3>🏪 Vista Market Admin</h3>
        <div><a href="/" style="color:#D1D5DB;text-decoration:none;font-size:12px;margin-right:8px;">Do'kon</a><button class="btn-logout" onclick="doLogout()">🚪 Chiqish</button></div>
    </div>
    
    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <button onclick="showTab('products', this)"><i class="fa-solid fa-box"></i> Mahsulotlar</button>
            <button onclick="showTab('add', this)"><i class="fa-solid fa-plus"></i> Mahsulot Qo'shish</button>
            <button onclick="showTab('banners', this)"><i class="fa-solid fa-image"></i> Bannerlar</button>
            <button onclick="showTab('orders', this)"><i class="fa-solid fa-truck"></i> Buyurtmalar</button>
            <button onclick="showTab('categories', this)"><i class="fa-solid fa-tags"></i> Kategoriyalar</button>
        </div>
        <div class="content" id="tabContent"></div>
    </div>
</div>

<script>
var allProducts = [];
var allBanners = [];
var allCategories = ['parfum','cosmetics','dishes','clothes','powders','electronics','toys'];
var catNames = {parfum:'Parfyumeriya',cosmetics:'Kosmetika',dishes:'Idish-tovoq',clothes:'Kiyim-kechak',powders:'Kukunlar',electronics:'Elektronika',toys:'O\'yinchoqlar'};
var uploadedImage = '';

fetch('/api/admin/check').then(function(r){return r.json()}).then(function(d){if(d.is_admin){showDash();loadTab('products');}});

function doLogin(){
    fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('passInput').value})})
    .then(function(r){return r.json()}).then(function(d){if(d.success){showDash();loadTab('products');}else{alert('Noto\'g\'ri parol!');}});
}
function doLogout(){fetch('/api/admin/logout',{method:'POST'}).then(function(){location.reload();});}
function showDash(){document.getElementById('loginPage').style.display='none';document.getElementById('dashPage').style.display='block';}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

function showTab(t, btn){
    closeSidebar();
    document.querySelectorAll('.sidebar button').forEach(function(b){b.classList.remove('active');});
    if (btn) btn.classList.add('active');
    loadTab(t);
}

function loadTab(t){
    if(t==='products') loadProducts();
    else if(t==='add') showAddForm();
    else if(t==='banners') loadBanners();
    else if(t==='orders') loadOrders();
    else if(t==='categories') loadCategories();
}

// ==================== MAHSULOTLAR ====================
function loadProducts(){
    fetch('/api/products').then(function(r){return r.json()}).then(function(d){
        if(d.success){
            allProducts=d.products;
            var html='<div class="stats"><div class="stat"><div class="num">'+allProducts.length+'</div><div class="label">Jami</div></div><div class="stat"><div class="num">'+allProducts.reduce(function(s,p){return s+p.in_stock;},0)+'</div><div class="label">Qoldiq</div></div></div><div class="card"><h3>📦 Mahsulotlar</h3><div class="table-wrap"><table><thead><tr><th>Rasm</th><th>Nomi</th><th>Kat.</th><th>Narx</th><th>Qoldiq</th><th>Amal</th></tr></thead><tbody>';
            allProducts.forEach(function(p){
                html+='<tr><td><img src="'+p.image+'" onerror="this.src=\'https://placehold.co/45\'"></td><td><strong>'+p.name+'</strong></td><td>'+(catNames[p.category]||p.category)+'</td><td><strong style="color:var(--vista)">'+p.price.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+'</strong></td><td><span class="badge '+(p.in_stock>10?'badge-green':p.in_stock>5?'badge-yellow':'badge-red')+'">'+p.in_stock+'</span></td><td><button class="btn btn-green btn-sm" onclick="editProduct(\''+p.id+'\')">✏️</button> <button class="btn btn-red btn-sm" onclick="delProd(\''+p.id+'\')">🗑</button></td></tr>';
            });
            html+='</tbody></table></div></div>';
            document.getElementById('tabContent').innerHTML=html;
        }
    });
}

function editProduct(id){
    var p=allProducts.find(function(x){return x.id===id;});
    if(!p)return;
    document.getElementById('editId').value=p.id;
    document.getElementById('editName').value=p.name;
    document.getElementById('editCat').value=p.category;
    document.getElementById('editPrice').value=p.price;
    document.getElementById('editOldPrice').value=p.old_price||'';
    document.getElementById('editStock').value=p.in_stock;
    document.getElementById('editDisc').value=p.discount||0;
    document.getElementById('editImg').value=p.image;
    document.getElementById('editDesc').value=p.description||'';
    document.getElementById('editModal').classList.add('show');
}
function closeEditModal(){document.getElementById('editModal').classList.remove('show');}
function saveEdit(e){
    e.preventDefault();
    var data={
        id:document.getElementById('editId').value,
        name:document.getElementById('editName').value,
        category:document.getElementById('editCat').value,
        price:parseInt(document.getElementById('editPrice').value),
        old_price:parseInt(document.getElementById('editOldPrice').value)||parseInt(document.getElementById('editPrice').value),
        in_stock:parseInt(document.getElementById('editStock').value)||0,
        discount:parseInt(document.getElementById('editDisc').value)||0,
        image:document.getElementById('editImg').value,
        description:document.getElementById('editDesc').value
    };
    fetch('/api/admin/products/update',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){return r.json()}).then(function(d){if(d.success){alert('✅ Yangilandi!');closeEditModal();loadProducts();}else{alert('❌ Xatolik!');}});
}
function delProd(id){
    if(!confirm('O\'chirilsinmi?'))return;
    fetch('/api/admin/products',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})})
    .then(function(r){return r.json()}).then(function(d){if(d.success){alert('O\'chirildi!');loadProducts();}});
}

function showAddForm(){
    uploadedImage='';
    document.getElementById('tabContent').innerHTML='<div class="card"><h3>➕ Yangi Mahsulot</h3><form onsubmit="addProd(event)"><div class="form-grid"><div class="form-group full"><label>📸 Rasm</label><div class="file-box" onclick="document.getElementById(\'fileInput\').click()"><i class="fa-solid fa-cloud-arrow-up"></i><p>Rasm yuklash</p><img id="previewImg" style="display:none;"><input type="file" id="fileInput" accept="image/*" onchange="uploadFile(this)"></div><div id="uploadStatus" style="margin-top:6px;font-size:12px;display:none;"></div></div><div class="form-group"><label>Nomi *</label><input id="aname" required></div><div class="form-group"><label>Kategoriya</label><select id="acat">'+allCategories.map(function(c){return '<option value="'+c+'">'+catNames[c]+'</option>';}).join('')+'</select></div><div class="form-group"><label>Narx *</label><input type="number" id="aprice" required></div><div class="form-group"><label>Eski narx</label><input type="number" id="aoldprice"></div><div class="form-group"><label>Soni</label><input type="number" id="astock" value="10"></div><div class="form-group"><label>Chegirma %</label><input type="number" id="adisc" value="0"></div><div class="form-group full"><label>Tavsif</label><textarea id="adesc" rows="2"></textarea></div></div><button type="submit" class="btn btn-green" style="margin-top:12px;padding:12px 24px;">➕ Qo\'shish</button></form></div>';
}

function uploadFile(input){
    if(!input.files[0])return;
    var fd=new FormData();fd.append('file',input.files[0]);
    var s=document.getElementById('uploadStatus');s.style.display='block';s.textContent='⏳ Yuklanmoqda...';s.style.color='#6B7280';
    fetch('/api/admin/upload',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){
        if(d.success){uploadedImage=d.url;document.getElementById('previewImg').src=d.url;document.getElementById('previewImg').style.display='block';s.textContent='✅ Yuklandi!';s.style.color='#10B981';}
        else{s.textContent='❌ '+d.message;s.style.color='#EF4444';}
    }).catch(function(){s.textContent='❌ Xatolik';s.style.color='#EF4444';});
}

function addProd(e){
    e.preventDefault();
    var data={name:document.getElementById('aname').value,category:document.getElementById('acat').value,price:document.getElementById('aprice').value,old_price:document.getElementById('aoldprice').value||document.getElementById('aprice').value,in_stock:document.getElementById('astock').value||10,discount:document.getElementById('adisc').value||0,image:uploadedImage||'https://placehold.co/400',description:document.getElementById('adesc').value};
    if(!data.name||!data.price){alert('Nomi va narx majburiy!');return;}
    fetch('/api/admin/products',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){return r.json()}).then(function(d){if(d.success){alert('✅ Qo\'shildi!');loadTab('products');}else{alert('❌ Xatolik!');}});
}

// ==================== BANNERLAR ====================
function loadBanners(){
    fetch('/api/admin/banners').then(function(r){return r.json()}).then(function(d){
        if(d.success){
            allBanners = d.banners;
            renderBannersList();
        }
    });
}

function renderBannersList(){
    var html = '<div class="card"><h3><i class="fa-solid fa-image"></i> Bannerlar</h3>';
    html += '<button class="btn btn-green" onclick="showAddBannerModal()" style="margin-bottom:16px;"><i class="fa-solid fa-plus"></i> Yangi Banner</button>';
    html += '<div id="bannersList">';
    
    if(allBanners.length === 0){
        html += '<p style="text-align:center;padding:30px;color:#6B7280;">Bannerlar yo\'q. Yangi banner qo\'shing!</p>';
    } else {
        for(var i=0; i<allBanners.length; i++){
            var b = allBanners[i];
            html += '<div class="banner-item">' +
                    '<img src="' + b.image + '" onerror="this.src=\'https://placehold.co/80x60\'">' +
                    '<div class="info">' +
                    '<h4>' + escapeHtml(b.title) + '</h4>' +
                    '<p>' + escapeHtml(b.subtitle) + '</p>' +
                    '<small>Link: ' + (b.link || '/') + '</small><br>' +
                    '<small>Holat: ' + (b.active ? '✅ Faol' : '❌ Faol emas') + '</small>' +
                    '</div>' +
                    '<div class="actions">' +
                    '<button class="btn btn-sm btn-outline" onclick="toggleBannerStatus(\'' + b.id + '\', ' + (!b.active) + ')">' + (b.active ? '❌ O\'chirish' : '✅ Yoqish') + '</button>' +
                    '<button class="btn btn-sm btn-red" onclick="deleteBanner(\'' + b.id + '\')"><i class="fa-solid fa-trash"></i></button>' +
                    '</div>' +
                    '</div>';
        }
    }
    html += '</div></div>';
    document.getElementById('tabContent').innerHTML = html;
}

function showAddBannerModal(){
    var modalHtml = '<div class="modal-overlay show" id="bannerModal">' +
        '<div class="modal">' +
        '<button class="close" onclick="closeBannerModal()">&times;</button>' +
        '<h3>➕ Yangi Banner</h3>' +
        '<form onsubmit="addBanner(event)">' +
        '<div class="form-group"><label>Rasm URL</label><input type="url" id="bannerImage" placeholder="https://..." required></div>' +
        '<div class="form-group"><label>Sarlavha</label><input type="text" id="bannerTitle" required></div>' +
        '<div class="form-group"><label>Matn</label><input type="text" id="bannerSubtitle"></div>' +
        '<div class="form-group"><label>Link</label><input type="text" id="bannerLink" value="/"></div>' +
        '<button type="submit" class="btn btn-green full">➕ Qo\'shish</button>' +
        '</form>' +
        '</div></div>';
    
    // Modalni qo'shish
    var existing = document.getElementById('bannerModal');
    if(existing) existing.remove();
    document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function closeBannerModal(){
    var modal = document.getElementById('bannerModal');
    if(modal) modal.remove();
}

function addBanner(e){
    e.preventDefault();
    var data = {
        image: document.getElementById('bannerImage').value,
        title: document.getElementById('bannerTitle').value,
        subtitle: document.getElementById('bannerSubtitle').value,
        link: document.getElementById('bannerLink').value || '/',
        active: true,
        order: allBanners.length + 1
    };
    
    fetch('/api/admin/banners', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(function(r){return r.json()}).then(function(d){
        if(d.success){
            alert('✅ Banner qo\'shildi!');
            closeBannerModal();
            loadBanners();
        } else {
            alert('❌ Xatolik!');
        }
    });
}

function toggleBannerStatus(id, active){
    var banner = allBanners.find(function(b){ return b.id === id; });
    if(!banner) return;
    banner.active = active;
    
    fetch('/api/admin/banners', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(banner)
    }).then(function(r){return r.json()}).then(function(d){
        if(d.success){
            loadBanners();
        }
    });
}

function deleteBanner(id){
    if(!confirm('Banner o\'chirilsinmi?')) return;
    fetch('/api/admin/banners', {
        method: 'DELETE',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id: id})
    }).then(function(r){return r.json()}).then(function(d){
        if(d.success){
            alert('O\'chirildi!');
            loadBanners();
        }
    });
}

// ==================== BUYURTMALAR ====================
function loadOrders(){
    fetch('/api/orders').then(function(r){return r.json()}).then(function(d){
        if(d.success){
            var html='<div class="stats"><div class="stat"><div class="num">'+d.orders.length+'</div><div class="label">Jami</div></div></div><div class="card"><h3>📋 Buyurtmalar</h3>';
            if(d.orders.length===0) html+='<p style="color:#6B7280;text-align:center;padding:30px;">Buyurtmalar yo\'q</p>';
            else d.orders.forEach(function(o){
                html+='<div class="banner-item" style="flex-direction:column;align-items:stretch;">';
                html+='<div style="display:flex;justify-content:space-between;"><strong>#'+o.order_id+'</strong><span class="badge '+(o.status==='pending'?'badge-yellow':'badge-green')+'">'+(o.status_text||o.status)+'</span></div>';
                html+='<div><strong>👤</strong> '+o.customer_name+' | 📱 '+o.phone+'</div>';
                html+='<div><strong>💰</strong> '+o.total.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' so\'m</div>';
                html+='<div><strong>📦</strong> '+(o.items?o.items.map(function(i){return i.name+' x'+i.quantity;}).join(', '):'')+'</div>';
                if(o.status==='pending'){
                    html+='<select onchange="updateStatus(\''+o.order_id+'\',this.value)" style="margin-top:8px;padding:8px;border-radius:6px;">';
                    html+='<option value="pending">⏳ Tayyorlanmoqda</option>';
                    html+='<option value="confirmed">✅ Yo\'lda</option>';
                    html+='<option value="delivered">🚚 Yetkazilgan</option>';
                    html+='<option value="cancelled">❌ Bekor</option>';
                    html+='</select>';
                }
                html+='</div>';
            });
            html+='</div>';
            document.getElementById('tabContent').innerHTML=html;
        }
    });
}

function updateStatus(oid,status){
    fetch('/api/admin/orders/'+oid+'/status',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:status})})
    .then(function(r){return r.json()}).then(function(d){if(d.success){alert('✅ Yangilandi!');loadOrders();}});
}

// ==================== KATEGORIYALAR ====================
function loadCategories(){
    var html='<div class="card"><h3>🏷️ Kategoriyalar</h3><div style="margin-bottom:16px;">';
    allCategories.forEach(function(c){html+='<span class="badge badge-green" style="margin:4px;padding:6px 12px;">'+catNames[c]+' <button onclick="deleteCat(\''+c+'\')" style="background:none;border:none;color:red;cursor:pointer;margin-left:6px;">&times;</button></span>';});
    html+='</div><h4 style="margin-bottom:8px;">➕ Yangi kategoriya</h4><div style="display:flex;gap:8px;flex-wrap:wrap;"><input id="newCatName" placeholder="Nomi" style="flex:1;padding:10px;border:2px solid #E5E7EB;border-radius:8px;"><input id="newCatId" placeholder="ID (lotin)" style="flex:1;padding:10px;border:2px solid #E5E7EB;border-radius:8px;"><button class="btn btn-green" onclick="addCat()">Qo\'shish</button></div></div>';
    document.getElementById('tabContent').innerHTML=html;
}
function addCat(){
    var name=document.getElementById('newCatName').value.trim();
    var id=document.getElementById('newCatId').value.trim().toLowerCase();
    if(!name||!id){alert('Nomi va ID kerak!');return;}
    if(allCategories.includes(id)){alert('Bu ID mavjud!');return;}
    allCategories.push(id);catNames[id]=name;
    alert('✅ Qo\'shildi!');loadCategories();
}
function deleteCat(id){
    if(!confirm('O\'chirilsinmi?'))return;
    allCategories=allCategories.filter(function(c){return c!==id;});
    delete catNames[id];
    alert('O\'chirildi!');loadCategories();
}

function escapeHtml(text){
    if(!text) return '';
    return text.replace(/[&<>]/g, function(m){
        if(m==='&') return '&amp;';
        if(m==='<') return '&lt;';
        if(m==='>') return '&gt;';
        return m;
    });
}
